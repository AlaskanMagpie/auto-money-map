name: Deploy preview to GitHub Pages

on:
  push:
    branches: ["master", "claude/exciting-tesla-gdsc7v"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run qr
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # While Pages is in legacy mode, GitHub's automatic Jekyll build of the
      # raw repo root races this deploy on every push (it finishes ~40s after
      # push; last writer wins). Deploy after it so the built site always
      # lands last. Remove once Settings → Pages → Source = "GitHub Actions".
      - name: Wait out the legacy Jekyll build
        run: sleep 75
      - id: deployment
        uses: actions/deploy-pages@v4
