name: Deploy preview to GitHub Pages

on:
  push:
    branches: ["master", "claude/exciting-tesla-gdsc7v"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pages must build via this workflow ONLY. While the repo is on the
      # "legacy" branch build, every push races this deploy against GitHub's
      # automatic Jekyll build of the raw repo root — when legacy wins, the
      # site serves unbuilt source and blank-screens. Flip it permanently.
      - name: Ensure Pages uses workflow builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PUT "repos/${{ github.repository }}/pages" -f build_type=workflow \
            || echo "::warning::Could not set Pages build_type=workflow (check permissions)"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run qr
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
