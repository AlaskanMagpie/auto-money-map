<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Auto Money Map — Automation Income Explorer</title>
    <meta
      name="description"
      content="50+ legal, ethical, automation-first income opportunities with ROI scoring and OpenServ agent workflows."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Diagnostic: turn a silent blank screen into a visible message.
      // Catches failed asset loads (capture phase) and a no-mount timeout.
      (function () {
        function show(msg) {
          var r = document.getElementById("root");
          if (r && r.children.length === 0) {
            r.innerHTML =
              '<pre style="color:#e8eaef;background:#08090c;min-height:100vh;margin:0;padding:24px;white-space:pre-wrap;font-family:monospace;font-size:13px">PromptForge could not start:\n\n' +
              msg +
              "\n\nTry a hard refresh (Ctrl/Cmd+Shift+R).</pre>";
          }
        }
        window.addEventListener(
          "error",
          function (e) {
            if (e && e.target && (e.target.src || e.target.href)) {
              show("Failed to load asset: " + (e.target.src || e.target.href));
            } else if (e && e.message) {
              show(e.message);
            }
          },
          true,
        );
        window.addEventListener("unhandledrejection", function (e) {
          show("Unhandled promise rejection: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
        });
        setTimeout(function () {
          show("App did not mount within 8s (see browser console for details).");
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
